<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Семейный бюджет</title>
  <script src="https://cdn.jsdelivr.net/npm/ag-grid-community/dist/ag-grid-community.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css">
  <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="tabs">
  <div class="tab active" onclick="switchTab('transactions', this)">Транзакции</div>
  <div class="tab" onclick="switchTab('form', this)">Добавить</div>
  <div class="tab" onclick="switchTab('accounts', this)">Счета</div>
  <div class="tab" onclick="switchTab('analytics', this)">Аналитика</div>
</div>

<div class="content">

  <div id="tab-transactions" class="panel active">
    <div class="filters">
      <div class="filter-group">
        <label>Тип</label>
        <div class="filter-tags" id="type-filters">
          <div class="tag active" data-value="income">Доход</div>
          <div class="tag active" data-value="expense">Расход</div>
          <div class="tag active" data-value="transfer">Перевод</div>
          <div class="tag active" data-value="debt">Долг</div>
        </div>
      </div>
      <div class="filter-group">
        <label for="category-filter">Категория</label>
        <input class="filter-search" id="category-filter" placeholder="Поиск по категории...">
      </div>
    </div>
    <div id="myGrid" class="ag-theme-alpine"></div>
  </div>

  <div id="tab-form" class="panel">
    <form id="transaction-form">
      <label>Тип
        <select name="type" id="type-select">
          <option value="income">Доход</option>
          <option value="expense">Расход</option>
          <option value="transfer">Перевод</option>
          <option value="debt">Долг</option>
        </select>
      </label>
      <label>Категория
        <select name="category_id" id="category-select">
          <option value="">— выберите —</option>
        </select>
      </label>
      <label>Счёт
        <select name="account_id" id="account-select">
          <option value="">— выберите —</option>
        </select>
      </label>
      <label id="to-account-label" style="display:none;">Счёт получатель
        <select name="to_account_id" id="to-account-select">
          <option value="">— выберите —</option>
        </select>
      </label>
      <label>Сумма
        <input type="number" name="amount" placeholder="1000" required>
      </label>
      <label>Дата
        <input type="date" name="date" required>
      </label>
      <label>Описание
        <input type="text" name="description" placeholder="Необязательно">
      </label>
      <button type="submit">Сохранить</button>
    </form>
    <p id="form-message" style="margin-top:12px;"></p>
  </div>

  <div id="tab-accounts" class="panel">
    <h3>Мои счета</h3>
    <div class="accounts-list" id="accounts-list"></div>
    <h3>Добавить счёт</h3>
    <form id="account-form">
      <label>Название
        <input type="text" name="name" placeholder="Например: Основная карта" required>
      </label>
      <label>Начальный баланс
        <input type="number" name="balance" placeholder="0" value="0" required>
      </label>
      <button type="submit">Создать счёт</button>
    </form>
    <p id="account-message" style="margin-top:12px;"></p>
  </div>

  <div id="tab-analytics" class="panel">
    <div style="display:flex; gap:12px; margin-bottom:20px; align-items:flex-end;">
      <label style="font-size:14px;">Год
        <input type="number" id="year" value="2024" style="width:90px; padding:6px; border:1px solid #ccc; border-radius:6px; margin-left:6px;">
      </label>
      <label style="font-size:14px;">Месяц
        <input type="number" id="month" value="1" min="1" max="12" style="width:70px; padding:6px; border:1px solid #ccc; border-radius:6px; margin-left:6px;">
      </label>
      <button onclick="loadAnalytics()">Показать</button>
    </div>
    <div class="summary-cards">
      <div class="card"><div class="label">Доходы</div><div class="value income" id="val-income">—</div></div>
      <div class="card"><div class="label">Расходы</div><div class="value expense" id="val-expense">—</div></div>
      <div class="card"><div class="label">Баланс</div><div class="value balance" id="val-balance">—</div></div>
    </div>
  </div>

</div>

<script src="app.js"></script>

</body>
</html>
